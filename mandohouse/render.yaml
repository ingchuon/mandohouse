services:
  - type: web
    name: mandohouse
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: mandohouse-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
